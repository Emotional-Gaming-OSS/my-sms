<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free SMS Sender - EdgeOne</title>
  <style>
    body {
      background-color: #FCFCFC;
      font-family: Arial, sans-serif;
    }
    .mainContent {
      border: 1px solid rgb(179, 179, 179);
      border-radius: 20px;
      width: 350px;
      margin: 5% auto 0 auto;
      padding: 20px;
      background-color: rgb(239, 244, 255);
    }
    input[type='text'], input[type='email'], select, textarea {
      padding: 10px;
      border: 1px solid #9c9c9c;
      border-radius: 5px;
      margin: 0 0 20px 0;
    }
    input[type='text'], input[type='email'], select {
      width: 210px;
    }
    textarea {
      width: 100%;
      min-width: 100%;
      max-width: 100%;
      height: 150px;
      box-sizing: border-box;
    }
    .inputTitle {
      text-align: right;
      display: inline-block;
      margin-right: 10px;
      width: 130px;
    }
    input[type="submit"] {
      position: relative;
      display: inline-block;
      font-weight: 700;
      white-space: nowrap;
      background-color: #eee;
      background-image: linear-gradient(#fcfcfc, #eee);
      background-repeat: repeat-x;
      border-radius: 3px;
      letter-spacing: 1px;
      font-size: 17px;
      font-family: proxima-nova, sans-serif;
      border: 1px solid #9c9c9c;
      cursor: pointer;
      padding: 5px 12px;
    }
    input[type="submit"]:hover {
      color: #FFF;
      background-color: #4983b4;
      background-image: linear-gradient(#4983b4, #245B8A);
    }
    .error {
      background-color: #f2dede;
      color: #b94a48;
      border: 1px solid #CF5858;
      border-radius: 10px;
      padding: 8px 35px 8px 14px;
      margin-top: 15px;
    }
    .success {
      background-color: #dff0d8;
      color: #468847;
      border: 1px solid #62A52A;
      border-radius: 10px;
      padding: 8px 35px 8px 14px;
      margin-top: 15px;
    }
    .loading {
      background-color: #d9edf7;
      color: #31708f;
      border: 1px solid #31708f;
      border-radius: 10px;
      padding: 8px 35px 8px 14px;
      margin-top: 15px;
    }
    h1 {
      text-align: center;
      font-size: 25px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="mainContent">
    <h1>Free SMS Sender (EdgeOne)</h1>
    <form id="smsForm">
      <div class="inputTitle">Phone Number:</div>
      <input type="text" id="phoneNumber" placeholder="5550001234" required><br/>

      <div class="inputTitle">Phone Carrier:</div>
      <select id="carrier" required>
        <option value="">Select Carrier</option>
        <option value="alltel">alltel</option>
        <option value="att">att</option>
        <option value="boost">boost</option>
        <option value="cellularone">cellularone</option>
        <option value="cingular">cingular</option>
        <option value="comcast">comcast</option>
        <option value="metropcs">metropcs</option>
        <option value="nextel">nextel</option>
        <option value="sprint">sprint</option>
        <option value="tmobile">tmobile</option>
        <option value="tracfone">tracfone</option>
        <option value="uscellular">uscellular</option>
        <option value="verizon">verizon</option>
        <option value="virginmobile">virginmobile</option>
        <option value="weblinkwireless">weblinkwireless</option>
      </select>

      <div class="inputTitle">Your Email:</div>
      <input type="email" id="senderEmail" placeholder="you@example.com (for replies)" required><br/>

      <div class="inputTitle" style="width: 100%; text-align: center;">Message:</div><br/>
      <textarea id="message" maxlength="160" placeholder="Enter your message (max 160 chars)"></textarea><br/>
      
      <div style="width: 100%; text-align: center; margin: 20px 0 0 0;">
        <input type="submit" value="Send Message">
      </div>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const CARRIERS = {
      alltel: "message.alltel.com",
      att: "txt.att.net",
      boost: "myboostmobile.com",
      cellularone: "cell1.textmsg.com",
      cingular: "cingularme.com",
      comcast: "comcastpcs.textmsg.com",
      metropcs: "metropcs.sms.us",
      nextel: "messaging.nextel.com",
      sprint: "messaging.sprintpcs.com",
      tmobile: "tmomail.net",
      tracfone: "txt.att.net",
      uscellular: "email.uscc.net",
      verizon: "vtext.com",
      virginmobile: "vmobl.com",
      weblinkwireless: "airmessage.net"
    };

    document.getElementById('smsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const resultDiv = document.getElementById('result');
      const submitBtn = document.querySelector('input[type="submit"]');
      
      const formData = {
        senderEmail: document.getElementById('senderEmail').value,
        message: document.getElementById('message').value,
        phoneNumber: document.getElementById('phoneNumber').value,
        carrier: document.getElementById('carrier').value
      };
      
      // Disable button during send
      submitBtn.disabled = true;
      submitBtn.value = "Sending...";
      resultDiv.innerHTML = '<div class="loading">Sending SMS...</div>';
      
      try {
        const response = await fetch('/api/send-sms', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (result.success) {
          resultDiv.innerHTML = '<div class="success">Successfully sent message!</div>';
        } else {
          let errorsHtml = '<div class="error">Errors: <ul>';
          result.errors.forEach(err => {
            errorsHtml += `<li>${err}</li>`;
          });
          errorsHtml += '</ul></div>';
          resultDiv.innerHTML = errorsHtml;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.value = "Send Message";
      }
    });
  </script>
</body>
</html>
